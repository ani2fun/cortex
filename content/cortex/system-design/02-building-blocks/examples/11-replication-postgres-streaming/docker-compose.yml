# Lesson 11 — Replication hands-on. Postgres primary + a streaming
# replica + a tiny Python script that writes to the primary and then
# immediately reads from the replica, showing the lag in real numbers.
# See ./README.md for the recipe.

services:
  primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lesson11
      POSTGRES_PASSWORD: lesson11
      POSTGRES_DB: lesson11
      # Enable streaming replication: a replication role + WAL settings.
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "listen_addresses=*"
    ports:
      - "55432:5432"
    volumes:
      - ./primary-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lesson11 -d lesson11"]
      interval: 1s
      timeout: 2s
      retries: 30

  replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lesson11
      POSTGRES_PASSWORD: lesson11
      POSTGRES_DB: lesson11
      PGUSER: lesson11
      PGPASSWORD: lesson11
    depends_on:
      primary:
        condition: service_healthy
    # The replica's data dir gets initialised via pg_basebackup against
    # the primary. We run that as the container's entrypoint override.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          echo "--- streaming base backup from primary ---"
          until pg_basebackup -h primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R; do
            echo "primary not ready for base backup; retry in 1s"
            sleep 1
          done
          chmod 0700 /var/lib/postgresql/data
        fi
        exec docker-entrypoint.sh postgres -c hot_standby=on -c listen_addresses='*'
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lesson11 -d lesson11"]
      interval: 1s
      timeout: 2s
      retries: 60

  demo:
    build: ./app
    depends_on:
      primary:
        condition: service_healthy
      replica:
        condition: service_healthy
    environment:
      PRIMARY_DSN: "host=primary port=5432 user=lesson11 password=lesson11 dbname=lesson11"
      REPLICA_DSN: "host=replica port=5432 user=lesson11 password=lesson11 dbname=lesson11"
