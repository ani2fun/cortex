# Lesson 7 — Load balancing hands-on. Three identical Python backends
# sit behind one NGINX reverse proxy. The reader runs `curl` against
# the proxy and watches request distribution + how the LB reacts when
# one backend is stopped. See ./README.md for the failure-induction
# recipe.

services:
  py-1:
    build: ./app
    environment:
      SERVER_TAG: "py-1"
    # No host port — the LB is the only thing exposed.

  py-2:
    build: ./app
    environment:
      SERVER_TAG: "py-2"

  py-3:
    build: ./app
    environment:
      SERVER_TAG: "py-3"

  lb:
    image: nginx:1.27-alpine
    depends_on: [py-1, py-2, py-3]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8087:80" # exposed for the host curl loop; matches the README

# No named networks — Docker Compose's default bridge wires service-name
# DNS automatically. The nginx config references `py-1`/`py-2`/`py-3`
# directly.
