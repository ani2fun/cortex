# Lesson 7 — Load balancing hands-on. Plain NGINX (open-source) does
# passive health checks only: it marks an upstream as failed when N
# consecutive request failures happen within a window, and re-tries
# after `fail_timeout`. NGINX Plus has active probes; we get the same
# *teaching* with passive ones and a smaller dependency footprint.

events { worker_connections 1024; }

http {
    # Three backend replicas. `max_fails=2 fail_timeout=10s` means a
    # backend is marked down after 2 failed responses inside 10 s, and
    # stays out of rotation for 10 s before NGINX retries it.
    upstream py_pool {
        server py-1:8000 max_fails=2 fail_timeout=10s;
        server py-2:8000 max_fails=2 fail_timeout=10s;
        server py-3:8000 max_fails=2 fail_timeout=10s;
        # Default policy is round-robin. Uncomment one of the others to
        # play with the algorithm:
        #
        # least_conn;       # least-connections — better under uneven request cost
        # ip_hash;          # sticky by client IP — naive session affinity
        # hash $request_uri consistent;  # consistent hashing on the URI
    }

    server {
        listen 80;

        location /healthz {
            return 200 "lb-up\n";
        }

        location / {
            proxy_pass         http://py_pool;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Retry the next upstream on a connection-level failure or
            # 5xx — the foundation of "the user shouldn't notice one
            # backend went down".
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 1s;
            proxy_read_timeout    3s;
        }
    }
}
