name: Build and Push go-judge Image

# Publishes the Visualise execution backend (runner/go-judge/) — the go-judge
# sandbox (criyle/go-judge) plus the Languages.scala toolchains (JDK 21, Python,
# C/C++, Go, Rust, Kotlin, TS/JS, SQLite). go-judge is cgroup-v2-native and
# standalone (no Postgres/Redis), and runs the JVM Visualise tracer's runtime
# in-process compilation (validated by runner/go-judge/spike-probes.sh). The
# homelab K8s (infra repo, deploy/apps/go-judge) pulls this image; the app is
# pointed at it via EXECUTOR_URL during the Phase-3 cutover (see ADR-0029).
#
# Build + push only. The infra Deployment references :latest; switch to
# SHA-pinned promotion later for immutable GitOps deploys.
#
# Built for linux/amd64 to match the homelab nodes (the Dockerfile is arch-aware,
# so it also builds for arm64 locally during the spike).

on:
  push:
    branches: [main]
    paths:
      - "runner/go-judge/**"
      - ".github/workflows/go-judge-image.yml"
  workflow_dispatch:

concurrency:
  group: cortex-go-judge-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build + push go-judge image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file runner/go-judge/Dockerfile \
            --push \
            --tag ghcr.io/ani2fun/cortex-go-judge:${{ github.sha }} \
            --tag ghcr.io/ani2fun/cortex-go-judge:latest \
            --cache-from type=gha,scope=cortex-go-judge \
            --cache-to type=gha,mode=max,scope=cortex-go-judge \
            runner/go-judge
