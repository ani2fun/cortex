name: Build, Push, and Promote Cortex

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cortex-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  call:
    uses: ./.github/workflows/_build-push-promote.yml
    with:
      image_repo: ghcr.io/ani2fun/cortex
      infra_kustomization_file: deploy/apps/cortex/overlays/prod/kustomization.yaml
      commit_message: "chore(cortex): promote image to"
    secrets: inherit
