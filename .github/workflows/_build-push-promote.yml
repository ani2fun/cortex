name: _build-push-promote (reusable)

on:
  workflow_call:
    inputs:
      image_repo:
        description: GHCR image repository (e.g. ghcr.io/ani2fun/cortex)
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile
        required: false
        default: Dockerfile
        type: string
      buildx_cache_scope:
        description: GHA buildx cache scope (leave empty for default)
        required: false
        default: ''
        type: string
      infra_repo:
        description: GitOps infra repo
        required: false
        default: ani2fun/infra
        type: string
      infra_kustomization_file:
        description: Path inside infra repo to the kustomization.yaml to patch
        required: true
        type: string
      commit_message:
        description: Commit message subject in the infra repo (image SHA is appended automatically)
        required: true
        type: string

jobs:
  build-push-promote:
    name: Build image and update infra repo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          CACHE_SCOPE: ${{ inputs.buildx_cache_scope }}
        run: |
          cache_from="type=gha"
          cache_to="type=gha,mode=max"
          if [ -n "$CACHE_SCOPE" ]; then
            cache_from="${cache_from},scope=${CACHE_SCOPE}"
            cache_to="${cache_to},scope=${CACHE_SCOPE}"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file "${{ inputs.dockerfile }}" \
            --push \
            --tag ${{ inputs.image_repo }}:${{ github.sha }} \
            --tag ${{ inputs.image_repo }}:latest \
            --cache-from "$cache_from" \
            --cache-to "$cache_to" \
            .

      - name: Checkout infra repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.infra_repo }}
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Update production image tag in infra repo
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ github.sha }}
          KUSTOMIZATION_PATH: infra/${{ inputs.infra_kustomization_file }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import yaml

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          data = yaml.safe_load(path.read_text())
          image_repo = os.environ["IMAGE_REPO"]
          accepted_names = {
              image_repo,
              image_repo.removeprefix("ghcr.io/"),
          }

          images = data.setdefault("images", [])
          found = False

          for image in images:
              if image.get("name") in accepted_names:
                  image["name"] = image_repo
                  image["newName"] = image_repo
                  image["newTag"] = os.environ["IMAGE_TAG"]
                  found = True
                  break

          if not found:
              images.append({
                  "name": image_repo,
                  "newName": image_repo,
                  "newTag": os.environ["IMAGE_TAG"],
              })

          path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Configure Git identity
        run: |
          git -C infra config user.name "${{ secrets.INFRA_GIT_USER_NAME }}"
          git -C infra config user.email "${{ secrets.INFRA_GIT_USER_EMAIL }}"

      - name: Commit and push infra change
        env:
          IMAGE_TAG: ${{ github.sha }}
          COMMIT_MSG: ${{ inputs.commit_message }}
        run: |
          git -C infra pull --rebase --autostash origin main

          git -C infra add "${{ inputs.infra_kustomization_file }}"

          if git -C infra diff --cached --quiet; then
            echo "No infra changes to commit."
            exit 0
          fi

          git -C infra commit -m "${COMMIT_MSG} ${IMAGE_TAG}"
          git -C infra push origin HEAD:main
