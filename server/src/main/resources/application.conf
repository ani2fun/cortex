cortex {
  port = 8080
  port = ${?PORT}

  staticDir = "./client/dist"
  staticDir = ${?STATIC_DIR}

  # Base URL of the standalone cortex-tutor service (a different origin). Handed
  # to the SPA via /api/auth/config; the browser calls the tutor directly with
  # the user's JWT. Unset => no tutor configured, and the coach UI degrades.
  tutorBaseUrl = ${?CORTEX_TUTOR_BASE_URL}

  db {
    url      = "jdbc:postgresql://localhost:5432/cortex"
    url      = ${?DB_URL}
    user     = "cortex"
    user     = ${?DB_USER}
    password = "cortex"
    password = ${?DB_PASSWORD}
  }

  redis {
    url      = "redis://localhost:6379"
    url      = ${?REDIS_URL}
    # Cache TTL for the /api/hello payload, in seconds.
    ttlSecs  = 10
    ttlSecs  = ${?REDIS_TTL_SECS}
  }

  mongo {
    uri      = "mongodb://localhost:27017"
    uri      = ${?MONGO_URI}
    database = "cortex"
    database = ${?MONGO_DB}
  }

  runner {
    # go-judge sandbox base URL. Dev: http://localhost:5050 (or the compose
    # service); prod: http://go-judge:5050. Unset => /api/run returns 503.
    executorUrl       = ${?EXECUTOR_URL}
    # Optional bearer token (go-judge ES_AUTH_TOKEN). Unset => no auth header
    # (the in-cluster NetworkPolicy gates access).
    executorAuthToken = ${?EXECUTOR_AUTHN_TOKEN}

    # Fixed-window rate limits for /api/run. Enforced by RateLimiter.scala;
    # bypassed entirely when auth.enabled is false (the bin/dev default).
    # `anonymous` is keyed per client IP; `authenticated` per JWT `sub`.
    rateLimit {
      anonymous     { windowSeconds = 60,   limit = 10  }
      authenticated { windowSeconds = 3600, limit = 100 }
    }
  }

  auth {
    # Master switch. When false (the bin/dev default), the server runs but
    # the JWT verifier short-circuits: required-auth endpoints return 503,
    # optional-auth endpoints treat every caller as anonymous, and the
    # rate limiter is a no-op. /api/auth/config then reports enabled=false
    # so the SPA skips initialising keycloak-js.
    enabled         = true
    enabled         = ${?AUTH_ENABLED}

    # Keycloak realm URL — validated as the `iss` claim and used to derive
    # the JWKS URL ({issuerUrl}/protocol/openid-connect/certs). Also handed
    # to the SPA via /api/auth/config.
    issuerUrl       = "https://keycloak.kakde.eu/realms/apps-prod"
    issuerUrl       = ${?KEYCLOAK_ISSUER_URL}

    realm           = "apps-prod"
    realm           = ${?KEYCLOAK_REALM}

    clientId        = "cortex-web"
    clientId        = ${?KEYCLOAK_CLIENT_ID}

    # Expected aud/azp claim value. Defaults to clientId (Keycloak puts the
    # client id in `azp` for a public SPA client); override only if needed.
    audience        = ${cortex.auth.clientId}
    audience        = ${?KEYCLOAK_AUDIENCE}

    jwksCacheTtlSec = 300
  }

  likec4 {
    # In-cluster Kubernetes Service URL — production default.
    # Override via LIKEC4_URL for bin/dev (http://localhost:8090)
    # or docker compose (http://likec4:8080).
    upstreamUrl = "http://likec4"
    upstreamUrl = ${?LIKEC4_URL}
  }

  cortex {
    # On-disk path to the content tree. Structure is convention-driven:
    # each subdirectory is a book; nested dirs become sections; .md files
    # are chapters. See CortexHandler for the full ruleset.
    root = "./content/cortex"
    root = ${?CORTEX_ROOT}

    # When true, mtime-check the content tree on every index request and
    # rebuild the cache if anything changed. Default true for dev DX; set
    # CORTEX_AUTO_RELOAD=false in prod where content is baked into the image.
    autoReload = true
    autoReload = ${?CORTEX_AUTO_RELOAD}
  }

  blog {
    # On-disk path to the blog post tree. Each *.md file is one post; the
    # slug is the filename without `.md`. Frontmatter carries title,
    # publishedAt, summary, tags, readMinutes, eyebrow, meta.
    root = "./content/blogs"
    root = ${?BLOG_ROOT}

    # Same mtime auto-reload behaviour as cortex. Disable in prod with
    # BLOG_AUTO_RELOAD=false.
    autoReload = true
    autoReload = ${?BLOG_AUTO_RELOAD}
  }
}
